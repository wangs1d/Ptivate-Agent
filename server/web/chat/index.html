<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Private AI Agent - Web Chat</title>
    <link rel="stylesheet" href="/chat/assets/styles.css" />
    <link rel="stylesheet" href="/chat/assets/gomoku-invite.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="side-head">
          <button type="button" class="side-toggle" id="side-toggle">◀</button>
        </div>
        <nav class="side-nav">
          <a class="active">对话</a>
          <a>Agent Link</a>
          <a>日程</a>
          <a>钱包</a>
          <a>技能商店</a>
          <a>游戏</a>
          <a>Agent World</a>
          <a>社交推文</a>
        </nav>
      </aside>

      <main class="main">
        <header class="header">
          <span class="header-title"></span>
          <button
            type="button"
            id="avatar-summon-btn"
            class="avatar-summon-btn"
            title="召唤桌宠"
            aria-pressed="false"
          >
            🤖
          </button>
        </header>
        <p class="status" id="status">初始化中...</p>

        <div class="main-content">
          <section class="chat-col">
            <div class="messages" id="messages"></div>
            <div class="composer">
              <button
                id="full-access"
                type="button"
                class="full-access-btn"
                title="沙箱模式：点击开启完全访问"
                aria-pressed="false"
              >
                🛡️
              </button>
              <input id="input" type="text" placeholder="发消息，例如：陪我玩五子棋" autocomplete="off" />
              <button id="send" type="button" disabled>发送</button>
            </div>
          </section>

          <aside class="right-panel">
            <details class="panel-card" open>
              <summary>📋 今日聚焦</summary>
              <div id="focus-list">
                <div class="panel-empty">今天还没有安排，和我说一声就能添加。</div>
              </div>
            </details>
            <details class="panel-card">
              <summary>✅ 待你确认 <span class="badge" id="confirm-badge">0</span></summary>
              <div id="confirm-list">
                <div class="panel-empty">当前没有待处理事项。</div>
              </div>
            </details>
          </aside>
        </div>
      </main>
    </div>

    <div id="agent-avatar-float" class="avatar-float-host is-hidden" aria-label="Agent 3D 形象" hidden>
      <iframe id="agent-avatar-frame" class="avatar-float-frame" title="Agent Sphere" allow="autoplay"></iframe>
    </div>

    <script>
      const shell = document.querySelector(".app-shell");
      const sideToggle = document.getElementById("side-toggle");
      if (shell && sideToggle) {
        sideToggle.addEventListener("click", () => {
          shell.classList.toggle("sidebar-collapsed");
          sideToggle.textContent = shell.classList.contains("sidebar-collapsed") ? "▶" : "◀";
        });
      }
    </script>

    <script type="module" src="/chat/assets/app.js"></script>
  </body>
</html>
