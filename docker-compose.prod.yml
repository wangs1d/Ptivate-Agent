# 生产环境覆盖 — HTTPS（443 端口）
#
# 用法：
#   1. 将 SSL 证书放到 ./ssl/ 目录：
#      - fullchain.pem（证书链）
#      - privkey.pem（私钥）
#   2. 启动：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# 获取免费 SSL 证书的方式：
#   - Cloudflare：DNS 托管到 Cloudflare，开启 SSL/TLS 加密（推荐，无需服务器配置）
#   - acme.sh：acme.sh --issue -d your.domain.com --nginx
#   - 阿里云/腾讯云免费证书：控制台申请后下载 nginx 格式放到 ./ssl/

services:
  web:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - ./ssl/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - downloads:/app/downloads
